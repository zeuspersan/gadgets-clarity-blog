baseURL = "https://gadgetsclarity.com/"
title = "GadgetsClarity"
copyright = "© GadgetsClarity — The Final Check Before You Checkout."
languageCode = "en-us"
theme = "PaperMod"
disableAliases = true
enableGitInfo = true

# Enable native Hugo features for SEO
enableRobotsTXT = true
buildDrafts = false
buildFuture = false


[build]
  noJSConfigInAssets = true

# Configure Frontmatter explicitly to prioritize Git commit dates
[frontmatter]
  date =["date", "publishDate", "lastmod"]
  lastmod =[":git", "lastmod", "date", "publishDate"]

[markup]
  [markup.tableOfContents]
    startLevel = 2  # Starts indexing at H2 (##)
    endLevel = 3    # Stops indexing after H3 (###)
    ordered = false # Uses bullet points instead of numbers

[mediaTypes]
  [mediaTypes."text/cloudflare"]
    mediaType = "text/plain"
    suffixes = [""]

[menus]
  [[menus.main]]
    identifier = "search"
    name = "Search"
    pageRef = "/search"
    weight = 20
  [[menus.main]]
    identifier = "tags"
    name = "Tags"
    pageRef = "/tags"
    weight = 30
  [[menus.main]]
    identifier = "archives"
    name = "Reviews"
    pageRef = "/archives"
    weight = 40
  [[menus.main]]
    identifier = "about"
    name = "About"
    pageRef = "/about"
    weight = 50
  [[menus.main]]
    identifier = "legal"
    name = "Legal"
    pageRef = "/legal"
    weight = 60

[outputs]
  home = ["HTML", "RSS", "REDIRECTS"]

[outputFormats]
  [outputFormats.REDIRECTS]
    mediaType = "text/cloudflare"
    baseName = "_redirects"
    isPlainText = true
    notAlternative = true

[pagination]
  pagerSize = 24

[params]
  author = "GadgetsClarity Expert Team"
  hideAuthor = true
  env = "production"
  description = "GadgetsClarity: The Final Check Before You Checkout. Expert, hands-on reviews of AI gadgets and modern tech."
  images =["images/gadgetsclarity-global-cover.webp"] # Global fallback for Open Graph/Twitter cards
  ShowShareButtons = true
  ShowReadingTime = true
  ShowBreadCrumbs = true
  ShowPostNavLinks = true
  ShowToc = true    # Enables ToC globally
  TocOpen = false   # Sets the ToC to be collapsed by default

[params.label]
  text = "GadgetsClarity" # The text displayed next to the logo
  icon = "/images/gadgetsclarity-logo.webp" # This natively populates BOTH the header and Google Schema!
  # iconHeight = 30 # Adjusts the visual height in the nav bar (default is 30)

[params.assets]
  favicon = "/favicon_io/favicon.ico"
  favicon16x16 = "/favicon_io/favicon-16x16.png"
  favicon32x32 = "/favicon_io/favicon-32x32.png"
  apple_touch_icon = "/favicon_io/apple-touch-icon.png"
  safari_pinned_tab = "/favicon_io/safari-pinned-tab.svg"

[params.schema]
  publisher = "GadgetsClarity"

[sitemap]
  disable = false
  filename = "sitemap.xml"
  # changefreq = "weekly" (Delete this - Set lastmod info from Git)
  # priority = 0.5        (Delete this)

[services]
  [services.googleAnalytics]
    id = 'G-DQNHTGNNP7'

[taxonomies]
  tag = "tags"